<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Deep slate background -->
  <rect width="180" height="180" rx="40" fill="#0b1628"/>
  <!-- Subtle inner glow -->
  <rect x="1" y="1" width="178" height="178" rx="39" stroke="url(#borderGrad)" stroke-width="1.5" fill="none"/>
  <!-- Background amber halo -->
  <ellipse cx="90" cy="95" rx="56" ry="52" fill="#d97706" fill-opacity="0.07"/>
  <!-- Left leg of A -->
  <line x1="90" y1="30" x2="34" y2="148" stroke="url(#legGrad)" stroke-width="14" stroke-linecap="round"/>
  <!-- Right leg of A -->
  <line x1="90" y1="30" x2="146" y2="148" stroke="url(#legGrad)" stroke-width="14" stroke-linecap="round"/>
  <!-- Crossbar -->
  <line x1="57" y1="104" x2="123" y2="104" stroke="url(#barGrad)" stroke-width="10" stroke-linecap="round"/>
  <!-- Apex glow dot -->
  <circle cx="90" cy="30" r="6" fill="#fbbf24" fill-opacity="0.9"/>
  <circle cx="90" cy="30" r="12" fill="#f59e0b" fill-opacity="0.2"/>
  <defs>
    <linearGradient id="legGrad" x1="34" y1="148" x2="146" y2="30" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#92400e"/>
      <stop offset="45%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#fbbf24"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="57" y1="104" x2="123" y2="104" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#b45309"/>
      <stop offset="100%" stop-color="#fcd34d"/>
    </linearGradient>
    <linearGradient id="borderGrad" x1="0" y1="0" x2="180" y2="180" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fbbf24" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#d97706" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#92400e" stop-opacity="0.1"/>
    </linearGradient>
  </defs>
</svg>
